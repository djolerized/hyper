# WordPress blog reverse proxy (status 200 = rewrite, URL stays on our domain)
[[redirects]]
  from = "/blog"
  to = "https://hypefy-landing-wp-prod-gncqf8hkg2e4bmbc.northeurope-01.azurewebsites.net/"
  status = 200
  force = true

[[redirects]]
  from = "/blog/*"
  to = "https://hypefy-landing-wp-prod-gncqf8hkg2e4bmbc.northeurope-01.azurewebsites.net/:splat"
  status = 200
  force = true



